osc=no

# ─── Deinterlacing ────────────────────────────────────────────────────────────
# Automatically deinterlace videos flagged as interlaced by the codec.
# 'auto' inserts yadif only when the stream carries interlaced flags (DVDs,
# broadcast captures, etc.). Progressive content is not affected.
# To toggle manually during playback use the 'd' key.
deinterlace=auto

# ─── Renderer ─────────────────────────────────────────────────────────────────
vo=gpu
gpu-api=d3d11
gpu-context=d3d11
hwdec=d3d11va

# ─── 10-bit output ────────────────────────────────────────────────────────────
d3d11-output-format=rgb10_a2

# ─── Upscaling / Downscaling ─────────────────────────────────────────────────
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
scale-antiring=0.7
cscale-antiring=0.7
sigmoid-upscaling=yes
correct-downscaling=yes
linear-downscaling=no

# ─── Sharpening ──────────────────────────────────────────────────────────────
sharpen=0.8

# ─── Debanding ───────────────────────────────────────────────────────────────
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=16
deband-grain=5

# ─── Dithering ───────────────────────────────────────────────────────────────
dither-depth=auto
temporal-dither=yes

# ─── Color vibrancy / contrast (PotPlayer-level punch) ──────────────────────
saturation=24
contrast=10
brightness=0
gamma=-1