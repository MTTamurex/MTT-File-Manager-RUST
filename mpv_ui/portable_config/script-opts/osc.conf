# Hide clutter #
showtitle=yes
volumecontrol=yes
showjump=yes
seekrange=no

# Faster hide #
hidetimeout=800
fadeduration=200

# Smaller seek handle #
seekbarhandlesize=0.3

# Keep UI on pause #
showonpause=yes

# Compact controls for narrow/portrait aspect ratios #
compactscale=yes
compactscalemin=0.72
compactscalethreshold=1100
